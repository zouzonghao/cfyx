version: '3.8'

services:
  cf-optimizer:
    image: sanqi37/cf-optimizer:latest
    container_name: cf-optimizer
    restart: unless-stopped
    ports:
      - "37377:37377"
    volumes:
      # Mount config file (required)
      - ./config.yaml:/root/config.yaml:ro
    logging:
      driver: "local"
      options:
        max-size: "1m"
        max-file: "3"
