name: CI-CD - Build and Push Docker Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'b[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., v1.0.0 or b1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: docker.io
  IMAGE_NAME: cfyx
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/sanqi37/cfyx
          tags: |
            type=semver,pattern={{version}},prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            type=semver,pattern={{version}}-beta,prefix=b,enable=${{ startsWith(github.ref, 'refs/tags/b') }}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/b') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (AMD64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-arm64:
    runs-on: ubuntu-latest
    needs: build-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/sanqi37/cfyx
          tags: |
            type=semver,pattern={{version}},prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            type=semver,pattern={{version}}-beta,prefix=b,enable=${{ startsWith(github.ref, 'refs/tags/b') }}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/b') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-amd64:
    runs-on: ubuntu-latest
    needs: build-amd64
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for AMD64
        run: |
          GOOS=linux GOARCH=amd64 go build -o cf-optimizer-linux-amd64 .
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o cf-optimizer-linux-amd64-static .

      - name: Upload AMD64 Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cf-optimizer-linux-amd64
            cf-optimizer-linux-amd64-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-arm64:
    runs-on: ubuntu-latest
    needs: build-arm64
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for ARM64
        run: |
          GOOS=linux GOARCH=arm64 go build -o cf-optimizer-linux-arm64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o cf-optimizer-linux-arm64-static .

      - name: Upload ARM64 Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cf-optimizer-linux-arm64
            cf-optimizer-linux-arm64-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
